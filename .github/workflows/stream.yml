name: 📡 Quran Live Stream Bot

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 118

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 تثبيت ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg wget
          ffmpeg -version | head -1

      - name: 🐍 Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 مكتبات
        run: pip install pyTelegramBotAPI==4.18.0

      - name: ✅ تحقق من الـ Secrets
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          if [ -z "$BOT_TOKEN" ]; then
            echo "❌ BOT_TOKEN فاضي!"
            exit 1
          fi
          echo "✅ BOT_TOKEN موجود"

      - name: 🤖 تشغيل البوت
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          cd bot
          python bot.py  
