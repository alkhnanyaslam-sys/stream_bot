name: 📡 Quran Live Stream Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'   # بدل كل ساعتين عشان تقلل إعادة التشغيل

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 110

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 تثبيت ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: 🐍 إعداد Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 تثبيت المكتبات
        run: |
          pip install pyTelegramBotAPI==4.18.0

      - name: 🤖 تشغيل البوت
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OUTPUT_URL: ${{ secrets.OUTPUT_URL }}
          STREAM_URL: ${{ secrets.STREAM_URL }}
        run: |
          echo "🚀 Starting bot..."
          python bot.py
