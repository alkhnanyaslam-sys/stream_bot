name: 📡 Quran Radio 24/7

on:
  schedule:
    - cron: '0 */2 * * *'   # كل ساعتين تلقائياً
  workflow_dispatch:          # تشغيل يدوي

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 118

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 تثبيت ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: 🐍 تثبيت Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 تثبيت المكتبات
        run: pip install -r requirements.txt

      - name: 📡 تشغيل البث مع Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          RTMP_URL: ${{ secrets.RTMP_URL }}
          STREAM_KEY: ${{ secrets.STREAM_KEY }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
        run: |
          chmod +x streamer/stream.sh
          
          # شغّل البوت في الخلفية
          cd bot
          python bot.py &
          BOT_PID=$!
          echo "Bot PID: $BOT_PID"
          
          # شغّل السكريبت الرئيسي
          cd ..
          bash streamer/stream.sh
          
          # أوقف البوت
          kill $BOT_PID 2>/dev/null || true

      - name: 📊 تقرير نهاية البث
        if: always()
        run: |
          echo "انتهت جلسة البث في: $(date)"
          echo "سيتجدد تلقائياً خلال دقائق"
